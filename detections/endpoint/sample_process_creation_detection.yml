name: Sample Suspicious Process Creation
id: f1a2b3c4-d5e6-7890-abcd-ef1234567890
version: 1
date: '2024-01-15'
author: dollce
type: TTP
status: production
description: >-
  This is a sample detection to verify the contentctl CI/CD pipeline.
  It detects cmd.exe process creation events from Sysmon EventCode 1 logs.
  This detection uses simple SPL without CIM/datamodel dependencies
  for easier testing in CI environments.
data_source:
  - Sysmon EventID 1
search: >-
  `sysmon` EventCode=1 process_name=cmd.exe
  | stats count min(_time) as firstTime max(_time) as lastTime by dest user process_name parent_process_name CommandLine
  | `security_content_ctime(firstTime)`
  | `security_content_ctime(lastTime)`
  | where count > 0
how_to_implement: >-
  You must be ingesting Sysmon EventCode 1 (Process Creation) data.
  This detection requires Sysmon to be installed and configured on endpoints.
known_false_positives: >-
  Legitimate administrators may use cmd.exe for routine tasks.
  Filter based on known admin accounts and expected command-line patterns.
references:
  - https://attack.mitre.org/techniques/T1059/003/
tags:
  analytic_story:
    - Sample Suspicious Activity
  asset_type: Endpoint
  confidence: 50
  impact: 30
  message: Suspicious cmd.exe execution detected on $dest$ by $user$
  mitre_attack_id:
    - T1059
    - T1059.003
  observable:
    - name: dest
      type: Hostname
      role:
        - Victim
    - name: user
      type: User
      role:
        - Victim
  product:
    - Splunk Enterprise
    - Splunk Enterprise Security
    - Splunk Cloud
  required_fields:
    - _time
    - dest
    - user
    - process_name
    - parent_process_name
    - CommandLine
  risk_score: 15
  security_domain: endpoint
tests:
  - name: True Positive Test
    attack_data:
      # NOTE: Replace this URL with attack data appropriate for your detection if needed.
      # This dataset contains Sysmon process creation logs from splunk/attack_data.
      - data: https://media.githubusercontent.com/media/splunk/attack_data/master/datasets/attack_techniques/T1059.001/powershell_script_block_logging/sysmon.log
        source: XmlWinEventLog:Microsoft-Windows-Sysmon/Operational
        sourcetype: xmlwineventlog
